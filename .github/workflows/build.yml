name: Build & Release Firmware

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

env:
  IDF_TARGET: esp32c3

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: espressif/idf:v6.0.1

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fix git ownership
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ========== Version management ==========
      - name: Calculate version
        id: version
        run: |
          # Read current version from version.txt
          FILE_VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "File version: $FILE_VERSION"
          
          # Get the last released version from git tags
          LAST_RELEASED=$(git tag -l "v*" --sort=-version:refname | head -1 | sed 's/^v//')
          echo "Last released: ${LAST_RELEASED:-none}"
          
          # Parse versions
          IFS='.' read -r F_MAJOR F_MINOR F_PATCH <<< "$FILE_VERSION"
          
          if [ -n "$LAST_RELEASED" ]; then
            IFS='.' read -r L_MAJOR L_MINOR L_PATCH <<< "$LAST_RELEASED"
          else
            L_MAJOR=0; L_MINOR=0; L_PATCH=0
          fi
          
          # Decision logic:
          # If user changed MAJOR or MINOR in version.txt, use that version
          # If user bumped PATCH, use that version
          # Otherwise auto-increment patch
          
          if [ "$F_MAJOR" -gt "$L_MAJOR" ] || [ "$F_MINOR" -gt "$L_MINOR" ]; then
            NEW_VERSION="$FILE_VERSION"
            echo "📌 User bumped major/minor: $NEW_VERSION"
          elif [ "$F_PATCH" -gt "$L_PATCH" ]; then
            NEW_VERSION="$FILE_VERSION"
            echo "📌 User bumped patch: $NEW_VERSION"
          else
            NEW_PATCH=$((L_PATCH + 1))
            NEW_VERSION="${L_MAJOR}.${L_MINOR}.${NEW_PATCH}"
            echo "📌 Auto-incremented: $NEW_VERSION"
          fi
          
          # Save to outputs
          echo "new=$NEW_VERSION" >> $GITHUB_OUTPUT
          
          # Update version.txt
          echo "$NEW_VERSION" > version.txt
          
          echo "📌 Version: $FILE_VERSION -> $NEW_VERSION"

      # ========== Get commit info ==========
      - name: Get commit info
        id: commit
        run: |
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "short_sha=$SHORT_SHA" >> $GITHUB_OUTPUT
          echo "📌 Commit: $SHORT_SHA"

      # ========== Cache ccache ==========
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: esp32c3-ccache-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            esp32c3-ccache-${{ github.ref_name }}-
            esp32c3-ccache-

      # ========== Configure ccache ==========
      - name: Configure ccache
        run: |
          mkdir -p ~/.ccache
          cat > ~/.ccache/ccache.conf << EOF
          max_size = 2G
          compiler_check = content
          hash_dir = false
          compression = true
          compression_level = 6
          EOF
          ccache -z
          echo "✅ ccache configured"

      # ========== Build firmware ==========
      - name: Build firmware
        run: |
          . $IDF_PATH/export.sh
          
          # Enable ccache
          export CCACHE_DIR=~/.ccache
          export IDF_CCACHE_ENABLE=1
          
          idf.py build
          
          # Show ccache stats
          ccache -s

      # ========== Get firmware info ==========
      - name: Get firmware info
        id: firmware
        if: success()
        run: |
          BIN_SIZE=$(stat -c%s build/app.bin)
          BIN_KB=$((BIN_SIZE / 1024))
          echo "size_bytes=$BIN_SIZE" >> $GITHUB_OUTPUT
          echo "size_kb=$BIN_KB" >> $GITHUB_OUTPUT
          echo "📌 Firmware: ${BIN_KB}KB"

      # ========== Package firmware ==========
      - name: Package firmware
        if: success()
        run: |
          apt-get update -qq && apt-get install -y -qq p7zip-full > /dev/null 2>&1
          
          VERSION="${{ steps.version.outputs.new }}"
          mkdir -p /tmp/release
          cp build/app.bin /tmp/release/
          cp build/bootloader/bootloader.bin /tmp/release/bootloader.bin
          cp build/partition_table/partition-table.bin /tmp/release/
          cp build/ota_data_initial.bin /tmp/release/
          cp partitions.csv /tmp/release/
          
          # Create README
          cat > /tmp/release/README.txt << READMEEOF
          ESP32-C3 PPG Monitor Firmware v${VERSION}
          
          Flash Command:
          esptool --chip esp32c3 --flash_mode dio --flash_size 4MB --flash_freq 80m \\
            write_flash 0x0 bootloader.bin 0x8000 partition-table.bin \\
            0x11000 ota_data_initial.bin 0x20000 app.bin
          
          Files:
          - bootloader.bin        -> 0x0
          - partition-table.bin   -> 0x8000
          - ota_data_initial.bin  -> 0x11000
          - app.bin               -> 0x20000
          READMEEOF
          
          cd /tmp/release
          7z a -t7z -m0=LZMA2 -mx=5 "/tmp/ppg-tf-esp32c3-v${VERSION}.7z" * > /dev/null
          echo "📦 Package created: ppg-tf-esp32c3-v${VERSION}.7z"

      # ========== Generate release notes ==========
      - name: Generate release notes
        id: release-notes
        if: success()
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          CURRENT_SHORT="${{ steps.commit.outputs.short_sha }}"
          
          # Find previous release tag
          PREV_TAG=$(git tag -l "v*" --sort=-version:refname | head -1)
          
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s (%h)" "$PREV_TAG..HEAD" -10)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" HEAD -10)
          fi
          
          # Build release body (limit to 300 chars)
          RELEASE_BODY="Firmware: v${VERSION} (${CURRENT_SHORT})"$'\n\n'"Changes:"$'\n'"${COMMITS}"
          
          if [ ${#RELEASE_BODY} -gt 300 ]; then
            RELEASE_BODY="${RELEASE_BODY:0:297}..."
          fi
          
          echo "$RELEASE_BODY" > /tmp/release_body.txt
          echo "📋 Release notes (${#RELEASE_BODY} chars):"
          cat /tmp/release_body.txt

      # ========== Commit version update ==========
      - name: Commit version update
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.txt
          git commit -m "chore: bump version to ${{ steps.version.outputs.new }} [skip ci]"
          git push origin master

      # ========== Delete old release ==========
      - name: Delete old release if tag exists
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.new }}"
          TAG="v${VERSION}"
          RELEASE_ID=$(gh release view "$TAG" --json id -q '.id' 2>/dev/null || true)
          if [ -n "$RELEASE_ID" ]; then
            echo "🗑️ Deleting old release $TAG"
            gh release delete "$TAG" --yes --cleanup-tag
          fi

      # ========== Create release ==========
      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.new }}
          name: "Firmware v${{ steps.version.outputs.new }}"
          body_path: /tmp/release_body.txt
          files: /tmp/ppg-tf-esp32c3-v${{ steps.version.outputs.new }}.7z
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ========== Summary ==========
      - name: Build summary
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then
            echo "✅ Build succeeded"
            echo "📦 Version: v${{ steps.version.outputs.new }}"
            echo "📦 Firmware: ${{ steps.firmware.outputs.size_kb }}KB"
          else
            echo "❌ Build failed"
          fi
